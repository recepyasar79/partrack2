name: OCR Schedule

# parktrack-ocr makinelerini yalniz aksam kontrolu penceresinde acik tutar.
# OCR gunde ~1-2 saat kullaniliyor; 2x shared-cpu-2x/4GB 7/24 ~$40/ay idle
# yaniyordu. Bu workflow ~%75 tasarruf saglar.
#   BASLAT 16:45 UTC = 19:45 TR (aksam kontrolu 20:00 TR'den 15 dk once isit)
#   DURDUR 20:00 UTC = 23:00 TR
# Not: min_machines_running=0 olmali (backend/python_ocr/fly.toml) yoksa Fly
# durdurulan makineyi geri acar. GH Actions cron'u best-effort (gecikebilir);
# 15 dk tampon dar — asil emniyet agi fly.toml'daki auto_start_machines=true:
# cron kacsa/gecikse bile 20:00'de ilk foto makineyi cold-start (70s) ile uyandirir.

on:
  schedule:
    - cron: '45 16 * * *'   # BASLAT (19:45 TR)
    - cron: '0 20 * * *'   # DURDUR (23:00 TR)
  workflow_dispatch:
    inputs:
      action:
        description: 'Manuel: start veya stop'
        required: true
        default: 'start'
        type: choice
        options: [start, stop]

jobs:
  scale:
    runs-on: ubuntu-latest
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Eylemi belirle (cron veya manuel)
        id: act
        run: |
          if [ "${{ github.event.schedule }}" = "0 20 * * *" ]; then
            echo "action=stop" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "45 16 * * *" ]; then
            echo "action=start" >> "$GITHUB_OUTPUT"
          else
            echo "action=${{ github.event.inputs.action }}" >> "$GITHUB_OUTPUT"
          fi

      - name: OCR makinelerini ${{ steps.act.outputs.action }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          ACTION: ${{ steps.act.outputs.action }}
        run: |
          ids=$(flyctl machines list -a parktrack-ocr --json | jq -r '.[].id')
          if [ -z "$ids" ]; then echo "Makine bulunamadi!"; exit 1; fi
          echo "Eylem=$ACTION | makineler: $ids"
          for id in $ids; do
            flyctl machine "$ACTION" "$id" -a parktrack-ocr
          done
          echo "--- son durum ---"
          flyctl machines list -a parktrack-ocr
