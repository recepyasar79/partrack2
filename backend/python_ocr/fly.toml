app = "parktrack-ocr"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "5000"
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 2048
