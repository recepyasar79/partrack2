# fly.toml app configuration file generated for parktrack-ocr on 2026-05-08T15:42:14+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'parktrack-ocr'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  LOG_LEVEL = 'INFO'
  PORT = '5000'

[http_service]
  internal_port = 5000
  force_https = true
  # ZAMANLI OLCEKLEME (2026-06-16): min_machines_running=0 + GitHub Actions cron
  # (.github/workflows/ocr-schedule.yml) makineleri yalniz aksam penceresinde
  # (18:00-23:00 TR) baslatir/durdurur. Neden: OCR gunde ~1-2 saat (aksam
  # kontrolu) kullaniliyor; 2x shared-cpu-2x/4GB 7/24 ~$40/ay idle yaniyordu.
  # min=0 SART: yoksa Fly durdurulan makineyi tabani 2'de tutmak icin geri acar.
  # auto_stop='off': cron baslatinca aksam boyu acik kalir (idle'da suspend olup
  # batch-ortasi resume gecikmesi yasanmaz). auto_start=true: cron kacirirsa ya
  # da gunduz beklenmedik istek gelirse ilk foto cold-start (70s) ile yine calisir.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 0

  # Yuk dagitimi (saha fix 2026-06-15): concurrency ayari YOKKEN Fly varsayilani
  # (soft_limit ~20) iki eszamanli OCR istegini AYNI makineye yigabiliyordu;
  # makine basina tek worker oldugu icin kuyruk 20s timeout'u asiyor, diger
  # makine bos kaliyordu (22:52 patlamasi: 19 Python OCR timeout, PR kurtardi
  # ama ~25-30s yavasladi). soft_limit=1 → Fly 2. istegi ayni makineye koymadan
  # once digerini doldurur → 2 yukleme 2 makineye yayilir, yigilma yok.
  # hard_limit=2 → makine basina en fazla 1 aktif + 1 kuyruk (~18s, timeout alti).
  [http_service.concurrency]
    type = "requests"
    soft_limit = 1
    hard_limit = 2

[[vm]]
  # 2 worker × (EasyOCR ~800MB + PaddleOCR detection ~300MB) + Python + OS
  # ≈ 2.6GB. 4GB güvenli marj; Fly.io 4GB shared ~$11/ay (vs 3GB ~$8, 2GB ~$5).
  # PaddleOCR detection AGPL-YOLOv8'in yerini aldığı için bu artış zorunlu —
  # ticari lisans uyumsuzluğunun bedeli ayda ~$6 fazla VM, hesap kabul edilebilir.
  memory = '4gb'
  cpus = 2
  memory_mb = 4096
