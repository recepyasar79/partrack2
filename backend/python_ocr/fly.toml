# fly.toml app configuration file generated for parktrack-ocr on 2026-05-08T15:42:14+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'parktrack-ocr'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  LOG_LEVEL = 'INFO'
  PORT = '5000'

[http_service]
  internal_port = 5000
  force_https = true
  # Keep at least one machine warm so the first photo of the evening doesn't
  # pay 35s machine boot + 35s EasyOCR cold start. The cost is ~$5-7/month
  # for a 2GB always-on machine, which is worth it for the security guard
  # workflow (one stalled upload during peak time blocks the whole shift).
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '2gb'
  cpus = 2
  memory_mb = 2048
