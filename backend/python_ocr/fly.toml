# fly.toml app configuration file generated for parktrack-ocr on 2026-05-08T15:42:14+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'parktrack-ocr'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  LOG_LEVEL = 'INFO'
  PORT = '5000'

[http_service]
  internal_port = 5000
  force_https = true
  # Keep at least one machine warm so the first photo of the evening doesn't
  # pay 35s machine boot + 35s EasyOCR cold start. The cost is ~$5-7/month
  # for a 2GB always-on machine, which is worth it for the security guard
  # workflow (one stalled upload during peak time blocks the whole shift).
  auto_stop_machines = 'off'
  auto_start_machines = true
  # 2: aksam kontrolu + gece cetelesi penceresinde (18-02) iki makine de
  # garanti ayakta olsun — 2 eszamanli OCR kapasitesi (frontend MAX_CONCURRENT=2)
  # hep hazir. auto_stop zaten 'off'; bu, bir makine restart/crash olursa Fly
  # tabani 2'de tutmasini saglar.
  min_machines_running = 2

  # Yuk dagitimi (saha fix 2026-06-15): concurrency ayari YOKKEN Fly varsayilani
  # (soft_limit ~20) iki eszamanli OCR istegini AYNI makineye yigabiliyordu;
  # makine basina tek worker oldugu icin kuyruk 20s timeout'u asiyor, diger
  # makine bos kaliyordu (22:52 patlamasi: 19 Python OCR timeout, PR kurtardi
  # ama ~25-30s yavasladi). soft_limit=1 → Fly 2. istegi ayni makineye koymadan
  # once digerini doldurur → 2 yukleme 2 makineye yayilir, yigilma yok.
  # hard_limit=2 → makine basina en fazla 1 aktif + 1 kuyruk (~18s, timeout alti).
  [http_service.concurrency]
    type = "requests"
    soft_limit = 1
    hard_limit = 2

[[vm]]
  # 2 worker × (EasyOCR ~800MB + PaddleOCR detection ~300MB) + Python + OS
  # ≈ 2.6GB. 4GB güvenli marj; Fly.io 4GB shared ~$11/ay (vs 3GB ~$8, 2GB ~$5).
  # PaddleOCR detection AGPL-YOLOv8'in yerini aldığı için bu artış zorunlu —
  # ticari lisans uyumsuzluğunun bedeli ayda ~$6 fazla VM, hesap kabul edilebilir.
  memory = '4gb'
  cpus = 2
  memory_mb = 4096
