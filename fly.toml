# fly.toml app configuration file generated for parktrack-backend on 2026-05-04T21:17:50+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'parktrack-backend'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  FRONTEND_URL = 'https://akasyaparktrack.vercel.app'
  JWT_EXPIRES_IN = '7d'
  NODE_ENV = 'production'
  PORT = '3000'
  TZ = 'Europe/Istanbul'
  WHATSAPP_TEMPLATE_NAME = 'ihlal_bildirimi'

[deploy]
  release_command = "sh -c './node_modules/.bin/knex migrate:latest'"

[http_service]
  internal_port = 3000
  force_https = true
  # min_machines_running=1 + suspend: app makinesi hep sicak kalir (aksam
  # kontrolunde cold-start ~5-15s gecikme olmasin). 'suspend' RAM'i diske
  # alir, resume 'stop'tan cok daha hizli. Cron process'leri ayri (scheduled).
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 80

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
